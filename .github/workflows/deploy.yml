name: Deploy to Coolify

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "selfhost/compose.supabase.yml"
      - "selfhost/Dockerfile.frontend"
      - "selfhost/nginx.conf"
      - "supabase/functions/**"
      - "src/**"
      - "package.json"
      - "bun.lockb"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to Coolify
        env:
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          BASE: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          base  = os.environ["BASE"].rstrip("/")
          token = os.environ["TOKEN"]
          auth  = f"Authorization: Bearer {token}"
          ct    = "Content-Type: application/json"

          def curl(*args):
              r = subprocess.run(["curl", "-sf", "--max-time", "30"] + list(args),
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print("curl error:", r.stderr[:300] or "(no stderr)")
                  sys.exit(1)
              return r.stdout

          github_sha = os.environ.get("GITHUB_SHA", "")
          expected_sha = github_sha[:7]
          changed = subprocess.run(
              ["git", "diff", "--name-only", "HEAD^", "HEAD"],
              capture_output=True,
              text=True,
              check=False,
          ).stdout.splitlines()
          if not changed:
              changed = ["manual-dispatch"]
          print("Changed paths:", ", ".join(changed))
          deploy_supabase = any(
              path == "selfhost/compose.supabase.yml"
              or path.startswith("supabase/functions/")
              for path in changed
          )
          deploy_frontend = any(
              path.startswith("src/")
              or path in {
                  "selfhost/Dockerfile.frontend",
                  "selfhost/nginx.conf",
                  "package.json",
                  "bun.lockb",
                  "package-lock.json",
                  ".github/workflows/deploy.yml",
                  "manual-dispatch",
              }
              for path in changed
          )

          # Find the production resources. Be deliberately specific here:
          # there may be historical/template Supabase resources in Coolify too.
          resources = json.loads(curl(f"{base}/api/v1/resources", "-H", auth))
          if not isinstance(resources, list):
              resources = [resources]

          try:
              apps = json.loads(curl(f"{base}/api/v1/applications", "-H", auth))
              if not isinstance(apps, list):
                  apps = [apps]
              print("Applications:")
              for app in apps:
                  print(
                      "  app:",
                      repr(str(app.get("name", "")).lower()),
                      "uuid=" + repr(app.get("uuid", "")),
                      "fqdn=" + repr(app.get("fqdn", "")),
                      "status=" + repr(app.get("status", "")),
                      "dockerfile=" + repr(app.get("dockerfile_location", "")),
                      "port=" + repr(app.get("ports_exposes", "")),
                  )
          except Exception as exc:
              print(f"WARNING: could not list applications: {exc}")

          supabase_uuid = None
          frontend_uuid = None
          stale_application_uuids = []
          for item in resources:
              name = str(item.get("name","") or item.get("project_name","")).lower()
              fqdn = str(item.get("fqdn","") or "").lower()
              resource_type = str(item.get("type", "") or "").lower()
              u    = item.get("uuid","")
              print(f"  resource: {name!r} fqdn={fqdn!r} uuid={u!r}")
              if u and ("comp.designflow.app" in fqdn or ("compshop" in name and "frontend" in name)):
                  frontend_uuid = u
              elif u and name.startswith("compshop:main") and resource_type == "application":
                  stale_application_uuids.append(u)
              elif u and ("supabase" in name or resource_type == "service"):
                  supabase_uuid = u

          if not supabase_uuid:
              print("ERROR: Supabase service stack not found in Coolify resources")
              sys.exit(1)
          if not frontend_uuid:
              print("ERROR: Frontend app not found in Coolify resources")
              sys.exit(1)

          for stale_uuid in stale_application_uuids:
              print(f"Stopping stale Coolify application UUID: {stale_uuid}")
              try:
                  stop_result = curl(f"{base}/api/v1/applications/{stale_uuid}/stop", "-H", auth)
                  print("Stale app stop response:", stop_result[:300])
              except SystemExit:
                  print(f"WARNING: failed to stop stale app {stale_uuid}; continuing frontend deploy")

          if deploy_supabase:
              print(f"Deploying Supabase stack UUID: {supabase_uuid}")
              result = curl(f"{base}/api/v1/deploy?uuid={supabase_uuid}", "-H", auth)
              print("Supabase deploy response:", result[:300])
          else:
              print("Skipping Supabase deploy; no Supabase/compose changes detected")

          if not deploy_frontend:
              print("Skipping frontend deploy; no frontend changes detected")
              print("Done.")
              sys.exit(0)

          if github_sha:
              print(f"Pinning frontend app to Git commit: {github_sha}")
              pin_result = curl(
                  "-X", "PATCH",
                  f"{base}/api/v1/applications/{frontend_uuid}",
                  "-H", auth,
                  "-H", ct,
                  "--data", json.dumps({"git_commit_sha": github_sha}),
              )
              print("Frontend pin response:", pin_result[:300])

              pinned_app = json.loads(curl(f"{base}/api/v1/applications/{frontend_uuid}", "-H", auth))
              pinned_sha = str(pinned_app.get("git_commit_sha") or "")
              if pinned_sha != github_sha:
                  print(f"ERROR: Coolify frontend app is pinned to {pinned_sha!r}, expected {github_sha!r}")
                  sys.exit(1)

          print(f"Deploying frontend UUID: {frontend_uuid}")
          result = curl(f"{base}/api/v1/deploy?uuid={frontend_uuid}&force=true", "-H", auth)
          print("Frontend deploy response:", result[:300])
          frontend_deployment_uuid = None
          try:
              deploy_payload = json.loads(result)
              deployments = deploy_payload.get("deployments") or []
              if deployments:
                  frontend_deployment_uuid = deployments[0].get("deployment_uuid")
          except Exception as exc:
              print(f"WARNING: could not parse frontend deploy response: {exc}")

          if frontend_deployment_uuid:
              import time

              print(f"Waiting for Coolify frontend deployment {frontend_deployment_uuid}")
              terminal_statuses = {"finished", "success", "failed", "cancelled", "canceled"}
              deployment_status = ""
              deployment_log_excerpt = ""
              for _ in range(90):
                  try:
                      status_payload = json.loads(curl(f"{base}/api/v1/deployments/{frontend_deployment_uuid}", "-H", auth))
                      deployment_status = str(
                          status_payload.get("status")
                          or status_payload.get("deployment", {}).get("status")
                          or status_payload.get("state")
                          or ""
                      ).lower()
                      deployment_log_excerpt = json.dumps(status_payload)[:800]
                      print(f"Coolify frontend deployment status: {deployment_status or '(unknown)'}")
                      if any(status in deployment_status for status in terminal_statuses):
                          break
                  except Exception as exc:
                      print(f"Coolify deployment status poll failed: {exc}")
                  time.sleep(10)

              if "fail" in deployment_status or "cancel" in deployment_status:
                  print("ERROR: Coolify frontend deployment failed:", deployment_log_excerpt)
                  sys.exit(1)
              if not any(status in deployment_status for status in {"finished", "success"}):
                  print("ERROR: Coolify frontend deployment did not finish:", deployment_log_excerpt)
                  sys.exit(1)

          if expected_sha:
              import re, time, urllib.request

              print(f"Checking live frontend for commit {expected_sha}")
              deadline = time.time() + 90
              last_seen = ""
              verified = False
              while time.time() < deadline:
                  try:
                      request = urllib.request.Request(
                          f"https://comp.designflow.app/?deploy_check={expected_sha}-{int(time.time())}",
                          headers={"Cache-Control": "no-cache", "Pragma": "no-cache"},
                      )
                      html = urllib.request.urlopen(request, timeout=20).read().decode("utf-8", "replace")
                      match = re.search(r'src="([^"]*assets/index-[^"]+\.js)"', html)
                      if match:
                          js_url = "https://comp.designflow.app" + match.group(1)
                          js_request = urllib.request.Request(
                              js_url,
                              headers={"Cache-Control": "no-cache", "Pragma": "no-cache"},
                          )
                          js = urllib.request.urlopen(js_request, timeout=20).read().decode("utf-8", "replace")
                          last_seen = match.group(1)
                          if expected_sha in js:
                              verified = True
                              print(f"Verified live frontend bundle {last_seen} contains {expected_sha}")
                              break
                          print(f"Live bundle {last_seen} does not contain {expected_sha} yet")
                      else:
                          print("Could not find live frontend bundle in index.html")
                  except Exception as exc:
                      print(f"Live verification attempt failed: {exc}")
                  time.sleep(10)

              if not verified:
                  print(f"ERROR: frontend did not serve commit {expected_sha}; last bundle seen: {last_seen}")
                  sys.exit(1)

          print("Done.")
          PYEOF
