name: Coolify audit

on:
  workflow_dispatch:
    inputs:
      delete_stale_compshop_app:
        description: "Delete stale localhost compshop application h8nwhgk682eedokx8nh2eg1q"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      add_compshop_domain:
        description: "Add https://compshop.designflow.app to the frontend Coolify app"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Coolify production resources
        env:
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          BASE: ${{ secrets.COOLIFY_BASE_URL }}
          DELETE_STALE_COMPSHOP_APP: ${{ inputs.delete_stale_compshop_app }}
          ADD_COMPSHOP_DOMAIN: ${{ inputs.add_compshop_domain }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          base = os.environ["BASE"].rstrip("/")
          auth = f"Authorization: Bearer {os.environ['TOKEN']}"

          def get(path):
              r = subprocess.run(
                  ["curl", "-sf", "--max-time", "20", f"{base}{path}", "-H", auth],
                  capture_output=True,
                  text=True,
              )
              if r.returncode != 0:
                  print(f"{path}: failed: {r.stderr[:200] or '(no stderr)'}")
                  return None
              try:
                  return json.loads(r.stdout)
              except json.JSONDecodeError:
                  print(f"{path}: non-json response: {r.stdout[:200]}")
                  return None

          def rows(payload):
              if payload is None:
                  return []
              return payload if isinstance(payload, list) else [payload]

          def pick(item, keys):
              return {key: item.get(key) for key in keys if key in item}

          applications = rows(get("/api/v1/applications"))
          resources = rows(get("/api/v1/resources"))

          if os.environ.get("DELETE_STALE_COMPSHOP_APP") == "true":
              stale_uuid = "h8nwhgk682eedokx8nh2eg1q"
              stale_app = next((app for app in applications if app.get("uuid") == stale_uuid), None)
              if not stale_app:
                  print(f"Stale app {stale_uuid} is already absent")
              else:
                  name = str(stale_app.get("name") or "")
                  fqdn = stale_app.get("fqdn")
                  build_pack = stale_app.get("build_pack")
                  if name != "compshop:main-n88osfd1s8q8sga6iaucz62c" or fqdn is not None or build_pack != "dockercompose":
                      print(f"Refusing to delete unexpected app shape: {pick(stale_app, ['name', 'uuid', 'fqdn', 'build_pack', 'status'])}")
                      sys.exit(1)
                  print(f"Deleting stale localhost app {stale_uuid}")
                  r = subprocess.run(
                      [
                          "curl",
                          "-sf",
                          "--max-time",
                          "30",
                          "-X",
                          "DELETE",
                          f"{base}/api/v1/applications/{stale_uuid}?delete_configurations=true&delete_volumes=false&docker_cleanup=true&delete_connected_networks=false",
                          "-H",
                          auth,
                      ],
                      capture_output=True,
                      text=True,
                  )
                  if r.returncode != 0:
                      print(f"Delete failed: {r.stderr[:300] or '(no stderr)'}")
                      sys.exit(1)
                  print(f"Delete response: {r.stdout[:300]}")
                  applications = rows(get("/api/v1/applications"))
                  resources = rows(get("/api/v1/resources"))

          if os.environ.get("ADD_COMPSHOP_DOMAIN") == "true":
              frontend = next(
                  (
                      app for app in applications
                      if app.get("uuid") == "frontend-uuid-comp-shop-prod-2026"
                      or app.get("name") == "compshop-frontend:main"
                  ),
                  None,
              )
              if not frontend:
                  print("Frontend app not found")
                  sys.exit(1)

              current_domains = str(frontend.get("fqdn") or frontend.get("domains") or "")
              desired = ["https://comp.designflow.app", "https://compshop.designflow.app"]
              merged = []
              for domain in current_domains.split(",") + desired:
                  domain = domain.strip()
                  if domain and domain not in merged:
                      merged.append(domain)
              domains = ",".join(merged)
              print(f"Updating frontend domains to: {domains}")
              r = subprocess.run(
                  [
                      "curl",
                      "-sf",
                      "--max-time",
                      "30",
                      "-X",
                      "PATCH",
                      f"{base}/api/v1/applications/{frontend['uuid']}",
                      "-H",
                      auth,
                      "-H",
                      "Content-Type: application/json",
                      "--data",
                      json.dumps({"domains": domains}),
                  ],
                  capture_output=True,
                  text=True,
              )
              if r.returncode != 0:
                  print(f"Domain update failed: {r.stderr[:300] or '(no stderr)'}")
                  sys.exit(1)
              print(f"Domain update response: {r.stdout[:300]}")
              applications = rows(get("/api/v1/applications"))
              resources = rows(get("/api/v1/resources"))

          print("=== APPLICATIONS ===")
          for app in applications:
              print(json.dumps(pick(app, [
                  "name",
                  "uuid",
                  "fqdn",
                  "status",
                  "git_repository",
                  "git_branch",
                  "git_commit_sha",
                  "build_pack",
                  "dockerfile_location",
                  "base_directory",
                  "ports_exposes",
                  "updated_at",
              ]), sort_keys=True))

          print("=== RESOURCES ===")
          for resource in resources:
              print(json.dumps(pick(resource, [
                  "name",
                  "uuid",
                  "fqdn",
                  "status",
                  "type",
                  "created_at",
                  "updated_at",
              ]), sort_keys=True))

          frontend = next(
              (
                  app for app in applications
                  if "comp.designflow.app" in str(app.get("fqdn") or "")
                  or "frontend" in str(app.get("name") or "").lower()
              ),
              None,
          )
          if not frontend:
              print("No frontend app found")
              sys.exit(0)

          frontend_uuid = frontend.get("uuid")
          print(f"=== FRONTEND LOGS {frontend_uuid} ===")
          logs = get(f"/api/v1/applications/{frontend_uuid}/logs")
          if logs is not None:
              text = json.dumps(logs)
              print(text[-4000:])

          print(f"=== FRONTEND DEPLOYMENTS {frontend_uuid} ===")
          deployments = get(f"/api/v1/deployments/applications/{frontend_uuid}")
          for deployment in rows(deployments)[:10]:
              print(json.dumps(pick(deployment, [
                  "deployment_uuid",
                  "status",
                  "commit",
                  "commit_sha",
                  "created_at",
                  "updated_at",
                  "finished_at",
              ]), sort_keys=True))
          PYEOF
