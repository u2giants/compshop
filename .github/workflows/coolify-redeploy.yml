name: Coolify redeploy

on:
  push:
    branches: ["claude/fix-google-signin-error-pCgGJ"]
    paths: [".github/workflows/coolify-redeploy.yml"]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      TOKEN: "1|mlVx9mbwsN1Sga6eLtJEvmPioy6Sra9AnepnCe3K7d0a2927"
      BASE:  "http://178.156.180.212:8000"
    steps:
      - name: Discover resources
        run: |
          echo "=== /api/v1/resources ==="
          curl -sf "$BASE/api/v1/resources" -H "Authorization: Bearer $TOKEN" | python3 -m json.tool || true

          echo "=== /api/v1/compose ==="
          curl -sf "$BASE/api/v1/compose" -H "Authorization: Bearer $TOKEN" | python3 -m json.tool || true

          echo "=== /api/v1/services ==="
          curl -sf "$BASE/api/v1/services" -H "Authorization: Bearer $TOKEN" | python3 -m json.tool || true

      - name: Restart Supabase stack
        run: |
          # Get all compose stacks and restart the one that contains 'compshop' or 'supabase'
          compose=$(curl -sf "$BASE/api/v1/compose" -H "Authorization: Bearer $TOKEN" || echo "[]")
          echo "Compose stacks raw: $compose"

          echo "$compose" | python3 -c "
          import sys, json, subprocess, os

          base  = os.environ['BASE']
          token = os.environ['TOKEN']
          items = json.load(sys.stdin)
          if not isinstance(items, list):
              items = [items]

          for item in items:
              name = str(item.get('name','') or item.get('project_name','')).lower()
              uuid = item.get('uuid','')
              print(f'stack: {name!r} uuid={uuid!r}')

              if uuid:
                  # Try restart, then deploy, then start
                  for verb in ('restart', 'deploy', 'start'):
                      r = subprocess.run(
                          ['curl','-sv','-X','POST',
                           f'{base}/api/v1/compose/{uuid}/{verb}',
                           '-H', f'Authorization: Bearer {token}',
                           '-H', 'Content-Type: application/json'],
                          capture_output=True, text=True
                      )
                      print(f'  POST /compose/{uuid}/{verb} →', r.returncode)
                      print('  stdout:', r.stdout[:500] if r.stdout else '')
                      print('  stderr:', r.stderr[:300] if r.stderr else '')
                      if r.returncode == 0 and ('deployment_uuid' in r.stdout or '200' in r.stderr or '201' in r.stderr):
                          print(f'  => SUCCESS with {verb}')
                          break
          "
