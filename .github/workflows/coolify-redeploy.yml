name: Coolify redeploy

on:
  push:
    branches: ["claude/fix-google-signin-error-pCgGJ"]
    paths: [".github/workflows/coolify-redeploy.yml"]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      TOKEN: "1|mlVx9mbwsN1Sga6eLtJEvmPioy6Sra9AnepnCe3K7d0a2927"
      BASE:  "http://178.156.180.212:8000"
    steps:
      - name: Check connectivity
        run: |
          echo "Runner IP: $(curl -sf https://api.ipify.org)"
          echo "TCP check port 8000:"
          timeout 5 bash -c 'echo >/dev/tcp/178.156.180.212/8000' && echo "PORT 8000 OPEN" || echo "PORT 8000 UNREACHABLE"

      - name: List all resources (must succeed)
        run: |
          resources=$(curl -sf --max-time 10 "$BASE/api/v1/resources" \
            -H "Authorization: Bearer $TOKEN")
          echo "$resources" | python3 -m json.tool

      - name: Restart Supabase compose stack
        run: |
          # Try compose endpoint first, then services, then resources
          for endpoint in compose services; do
            echo "=== $endpoint ==="
            data=$(curl -sf --max-time 10 "$BASE/api/v1/$endpoint" \
              -H "Authorization: Bearer $TOKEN" || echo "[]")
            echo "$data" | python3 -m json.tool

            echo "$data" | python3 - <<'PYEOF'
import sys, json, subprocess, os
base  = os.environ["BASE"]
token = os.environ["TOKEN"]
items = json.load(sys.stdin)
if isinstance(items, dict):
    items = list(items.values()) if not items.get("uuid") else [items]
if not isinstance(items, list):
    items = []
for item in (items if items else []):
    name = str(item.get("name","") or item.get("project_name","")).lower()
    uuid = item.get("uuid","")
    print(f"  item: name={name!r} uuid={uuid!r}")
    if not uuid:
        continue
    for verb in ("restart", "deploy"):
        r = subprocess.run(
            ["curl","-sf","--max-time","10","-X","POST",
             f"{base}/api/v1/{os.environ.get('endpoint','compose')}/{uuid}/{verb}",
             "-H", f"Authorization: Bearer {token}",
             "-H", "Content-Type: application/json"],
            capture_output=True, text=True
        )
        print(f"    POST /{uuid}/{verb} rc={r.returncode}: {r.stdout[:300]}")
        if r.returncode == 0:
            print(f"    => triggered via {verb}")
            break
PYEOF
          done
