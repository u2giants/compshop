name: Coolify redeploy

on:
  push:
    branches: ["claude/fix-google-signin-error-pCgGJ"]
    paths: [".github/workflows/coolify-redeploy.yml"]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      TOKEN: "1|mlVx9mbwsN1Sga6eLtJEvmPioy6Sra9AnepnCe3K7d0a2927"
      BASE:  "http://178.156.180.212:8000"
    steps:
      - name: Check connectivity to Coolify
        run: |
          echo "Runner public IP: $(curl -sf https://api.ipify.org)"
          timeout 5 bash -c 'echo >/dev/tcp/178.156.180.212/8000' \
            && echo "PORT 8000 OPEN" \
            || { echo "PORT 8000 UNREACHABLE"; exit 1; }

      - name: List resources
        run: |
          curl -f --max-time 10 "$BASE/api/v1/resources" \
            -H "Authorization: Bearer $TOKEN" | tee /tmp/resources.json | python3 -m json.tool
          curl -f --max-time 10 "$BASE/api/v1/compose" \
            -H "Authorization: Bearer $TOKEN" | tee /tmp/compose.json | python3 -m json.tool || true

      - name: Restart Supabase compose stack
        run: |
          echo "" \
            | base64 -d > /tmp/restart.py
          python3 /tmp/restart.py /tmp/compose.json /tmp/resources.json
