server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker must NOT be cached
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    expires off;
    try_files $uri =404;
  }

  # SPA fallback: any route that isn't a real file → index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck for Coolify
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Hide server tokens
  server_tokens off;
}
