# ============================================================================
# Self-hosted Supabase stack for CompShop
# Tested with the official supabase/supabase project Compose file (Nov 2025).
# Image versions are PINNED to avoid surprise breakage on Coolify auto-pull.
# ============================================================================
# Coolify usage:
#   1. New Resource → Docker Compose → paste this file
#   2. Set domain on `kong` service to:  api.comp.designflow.app
#   3. Set domain on `studio` service to: db.comp.designflow.app
#   4. Paste env vars from .env.example into Coolify's env var UI
#   5. Coolify auto-provisions Let's Encrypt SSL via Traefik
# ============================================================================

x-restart: &restart
  restart: unless-stopped

services:
  # -------------------------------------------------------------------------
  # PostgreSQL database (the heart of everything)
  # -------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.060
    <<: *restart
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-backups:/backups
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  # -------------------------------------------------------------------------
  # Auth (GoTrue) — handles signup, login, OAuth, password resets
  # -------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.158.1
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI}

  # -------------------------------------------------------------------------
  # PostgREST — turns the database into a REST API
  # -------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.3
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}

  # -------------------------------------------------------------------------
  # Realtime — websockets for postgres_changes subscriptions
  # -------------------------------------------------------------------------
  realtime:
    image: supabase/realtime:v2.34.43
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"

  # -------------------------------------------------------------------------
  # Storage — file uploads (photos, retailer logos)
  # -------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.11.13
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
      rest: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage

  # -------------------------------------------------------------------------
  # imgproxy — on-the-fly image resize/compression for thumbnails
  # -------------------------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    <<: *restart
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:z

  # -------------------------------------------------------------------------
  # Edge Functions runtime (Deno)
  # -------------------------------------------------------------------------
  functions:
    image: supabase/edge-runtime:v1.62.2
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      VERIFY_JWT: "false"
      AI_PROVIDER: ${AI_PROVIDER}
      AI_MODEL: ${AI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      BREVO_API_KEY: ${BREVO_API_KEY}
    volumes:
      - ../supabase/functions:/home/deno/functions:Z
    command:
      - start
      - --main-service
      - /home/deno/functions/main

  # -------------------------------------------------------------------------
  # Kong — API gateway (single public entry point)
  # -------------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    <<: *restart
    depends_on:
      auth: { condition: service_started }
      rest: { condition: service_started }
      realtime: { condition: service_started }
      storage: { condition: service_healthy }
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    expose:
      - "8000"
    # Coolify: set the domain on this service to api.comp.designflow.app
    # Coolify auto-handles SSL via Traefik.

  # -------------------------------------------------------------------------
  # Studio — the admin UI
  # -------------------------------------------------------------------------
  studio:
    image: supabase/studio:20251007-7c2870b
    <<: *restart
    depends_on:
      kong: { condition: service_started }
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: CompShop
      DEFAULT_PROJECT_NAME: CompShop
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    expose:
      - "3000"
    # Coolify: set the domain to db.comp.designflow.app
    # Coolify: also enable basic auth on this service for extra protection.

  # -------------------------------------------------------------------------
  # Postgres metadata API (used by Studio)
  # -------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.84.2
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # -------------------------------------------------------------------------
  # Daily backup of Postgres to /backups (mounted volume)
  # -------------------------------------------------------------------------
  backup:
    image: postgres:15-alpine
    <<: *restart
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-backups:/backups
    entrypoint: |
      sh -c '
      while true; do
        TS=$$(date +%Y%m%d_%H%M%S)
        echo "[backup] Dumping at $$TS"
        pg_dump -h db -U postgres -d ${POSTGRES_DB} -Fc -f /backups/compshop_$$TS.dump
        # Keep last 14 days
        find /backups -name "compshop_*.dump" -mtime +14 -delete
        sleep 86400
      done
      '

volumes:
  db-data:
  db-backups:
  storage-data:
